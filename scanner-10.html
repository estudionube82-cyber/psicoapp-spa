<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Scanner — Pérez Aré</title>
<meta name="theme-color" content="#0F172A"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="/manifest-scanner.json"/>
<link rel="apple-touch-icon" href="/icon-scanner.png"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0F172A;--surface:#1E293B;--accent:#38BDF8;--accent2:#818CF8;
  --green:#34D399;--red:#F87171;--text:#F1F5F9;--muted:#94A3B8;--border:#334155;--r:16px;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;max-width:430px;margin:0 auto;height:100dvh;}

.header{padding:52px 20px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hbrand{display:flex;align-items:center;gap:10px;}
.hicon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 16px rgba(56,189,248,.3);}
.htitle{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;letter-spacing:-.02em;}
.hsub{font-size:.75rem;color:var(--muted);}
.btn-drive{display:flex;align-items:center;gap:6px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:7px 12px;font-size:.75rem;font-weight:700;color:var(--muted);cursor:pointer;}
.btn-drive.on{color:var(--green);border-color:var(--green);}

.sbar{padding:0 16px 8px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.scount{font-size:.8rem;font-weight:700;color:var(--muted);}
.scount span{color:var(--accent);font-size:1rem;}
.sbclear{font-size:.75rem;font-weight:700;color:var(--red);background:none;border:none;cursor:pointer;padding:4px 8px;}

.pbar{height:3px;background:#334155;border-radius:2px;margin:0 16px 12px;overflow:hidden;display:none;}
.pfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s;width:0%;}

.preview{flex:1;padding:0 16px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.preview::-webkit-scrollbar{display:none;}
.empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);text-align:center;padding:20px;}
.eicon{width:80px;height:80px;background:var(--surface);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:36px;border:2px dashed var(--border);}
.etitle{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;color:var(--text);}
.esub{font-size:.85rem;line-height:1.5;}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-bottom:16px;}
.pitem{position:relative;border-radius:12px;overflow:hidden;background:var(--surface);box-shadow:0 4px 16px rgba(0,0,0,.3);}
.pitem img{width:100%;height:auto;display:block;border-radius:12px;}
.pitem img.scanned{filter:grayscale(1) contrast(2.2) brightness(1.15);}
.pnum{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.6);color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;}
.pdel{position:absolute;top:8px;right:8px;width:28px;height:28px;background:rgba(248,113,113,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;font-size:14px;color:#fff;}
.pbadge{position:absolute;bottom:8px;left:8px;background:rgba(52,211,153,.9);color:#064e3b;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;}

.actions{padding:12px 16px 32px;display:flex;flex-direction:column;gap:10px;flex-shrink:0;background:linear-gradient(to top,var(--bg) 80%,transparent);}
.bcap{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0F172A;border:none;border-radius:var(--r);font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 20px rgba(56,189,248,.35);}
.bcap:active{transform:scale(.98);}
.brow{display:flex;gap:10px;}
.bsec{flex:1;padding:13px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.875rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.bsec:active{transform:scale(.98);}
.bsec.pdf{border-color:var(--green);color:var(--green);}
.bsec.upl{border-color:var(--accent2);color:var(--accent2);}
.bsec:disabled{opacity:.4;cursor:not-allowed;}

/* CROP */
.crop-ov{position:fixed;inset:0;background:#000;z-index:100;display:none;flex-direction:column;}
.crop-ov.open{display:flex;}
.crop-hdr{padding:52px 20px 12px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.85);flex-shrink:0;}
.crop-ttl{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:#fff;}
.crop-btns{display:flex;gap:8px;}
.bskip{padding:8px 14px;background:rgba(255,255,255,.12);border:none;border-radius:10px;color:#fff;font-size:.8rem;font-weight:700;cursor:pointer;}
.bok{padding:8px 16px;background:var(--accent);border:none;border-radius:10px;color:#0F172A;font-size:.8rem;font-weight:800;cursor:pointer;}
.crop-body{flex:1;position:relative;overflow:hidden;}
#cropCanvas{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);touch-action:none;}
.crop-ftr{padding:12px 20px 28px;background:rgba(0,0,0,.85);text-align:center;font-size:.8rem;color:var(--muted);font-weight:600;flex-shrink:0;}

.toast{position:fixed;bottom:140px;left:50%;transform:translateX(-50%);background:#1E293B;border:1px solid var(--border);color:var(--text);padding:12px 20px;border-radius:12px;font-size:.875rem;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.4);pointer-events:none;}
.toast.show{opacity:1;}
#fin{display:none;}
</style>
</head>
<body>

<div class="header">
  <div class="hbrand">
    <div class="hicon">📄</div>
    <div><div class="htitle">Scanner</div><div class="hsub">Pérez Aré · Estudio</div></div>
  </div>
  <button class="btn-drive" id="btnDrive" onclick="conectarDrive()"><span id="drvLbl">☁ Drive</span></button>
</div>

<div class="sbar" id="sbar" style="display:none">
  <div class="scount"><span id="cnt">0</span> página(s)</div>
  <button class="sbclear" onclick="limpiar()">✕ Limpiar</button>
</div>
<div class="pbar" id="pbar"><div class="pfill" id="pfill"></div></div>

<div class="preview">
  <div class="empty" id="empty">
    <div class="eicon">📷</div>
    <div class="etitle">Sin páginas</div>
    <div class="esub">Capturá y ajustá las 4 esquinas del documento antes de agregar.</div>
  </div>
  <div class="grid" id="grid" style="display:none"></div>
</div>

<div class="actions">
  <button class="bcap" onclick="capturar()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    Capturar página
  </button>
  <div class="brow">
    <button class="bsec pdf" id="bpdf" onclick="genPDF()" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Guardar PDF
    </button>
    <button class="bsec upl" id="bupl" onclick="subirDrive()" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
      Subir a Drive
    </button>
  </div>
  <button class="bsec" id="bshr" onclick="compartir()" disabled style="border-color:#25D366;color:#25D366;width:100%;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
    Compartir (WhatsApp, Mail...)
  </button>
</div>

<!-- CROP MODAL -->
<div class="crop-ov" id="cropOv">
  <div class="crop-hdr">
    <div class="crop-ttl">📐 Ajustar documento</div>
    <div class="crop-btns">
      <button class="bskip" onclick="skip()">Sin recorte</button>
      <button class="bok" onclick="aplicar()">✓ Recortar</button>
    </div>
  </div>
  <div class="crop-body"><canvas id="cropCanvas"></canvas></div>
  <div class="crop-ftr">Arrastrá las esquinas azules para ajustar el documento</div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fin" accept="image/*" capture="environment" onchange="onFile(event)"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const CID   = '258644442158-gid3k8d4ga7a9lem9e4tjl4aif33gsu1.apps.googleusercontent.com';
const DSCOPE= 'https://www.googleapis.com/auth/drive.file';

let pages=[], token=null, blob=null;
let cImg=null, cPts=[], drag=-1, scale=1, pending=null;
let CC, CX; // canvas & context

function showToast(m,ms=3000){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),ms);}
function capturar(){document.getElementById('fin').value='';document.getElementById('fin').click();}

async function onFile(e){
  const f=e.target.files[0]; if(!f) return;
  pending=f;
  // Leer orientacion EXIF y corregir antes de todo
  const url=await fixExifOrientation(f);
  const img=await loadImg(url);
  openCrop(img);
}

async function fixExifOrientation(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=function(e){
      const view=new DataView(e.target.result);
      // Buscar orientacion EXIF
      let orientation=1;
      if(view.getUint16(0,false)===0xFFD8){
        let offset=2;
        while(offset<view.byteLength){
          if(view.getUint16(offset,false)===0xFFE1){
            if(view.getUint32(offset+4,false)===0x45786966){
              const little=view.getUint16(offset+10,false)===0x4949;
              const ifdOffset=view.getUint32(offset+14,little);
              const tags=view.getUint16(offset+10+ifdOffset,little);
              for(let i=0;i<tags;i++){
                if(view.getUint16(offset+10+ifdOffset+2+i*12,little)===0x0112){
                  orientation=view.getUint16(offset+10+ifdOffset+2+i*12+8,little);
                  break;
                }
              }
            }
            break;
          }
          offset+=2+view.getUint16(offset+2,false);
        }
      }
      // Cargar imagen y rotar segun orientacion
      const img=new Image();
      img.onload=function(){
        const canvas=document.createElement('canvas');
        const ctx=canvas.getContext('2d');
        let w=img.naturalWidth, h=img.naturalHeight;
        if(orientation>4){ canvas.width=h; canvas.height=w; }
        else { canvas.width=w; canvas.height=h; }
        switch(orientation){
          case 2: ctx.transform(-1,0,0,1,w,0); break;
          case 3: ctx.transform(-1,0,0,-1,w,h); break;
          case 4: ctx.transform(1,0,0,-1,0,h); break;
          case 5: ctx.transform(0,1,1,0,0,0); break;
          case 6: ctx.transform(0,1,-1,0,h,0); break;
          case 7: ctx.transform(0,-1,-1,0,h,w); break;
          case 8: ctx.transform(0,-1,1,0,0,w); break;
        }
        ctx.drawImage(img,0,0);
        resolve(canvas.toDataURL('image/jpeg',0.95));
      };
      img.src=URL.createObjectURL(file);
    };
    reader.readAsArrayBuffer(file);
  });
}

function openCrop(img){
  cImg=img;
  CC=document.getElementById('cropCanvas');
  CX=CC.getContext('2d');
  const body=CC.parentElement;
  const maxW=body.clientWidth-24;
  const maxH=body.clientHeight-16;
  scale=Math.min(maxW/img.naturalWidth, maxH/img.naturalHeight, 1);
  CC.width =Math.round(img.naturalWidth *scale);
  CC.height=Math.round(img.naturalHeight*scale);
  const mx=CC.width*.1, my=CC.height*.1;
  cPts=[{x:mx,y:my},{x:CC.width-mx,y:my},{x:CC.width-mx,y:CC.height-my},{x:mx,y:CC.height-my}];
  document.getElementById('cropOv').classList.add('open');
  draw();
  bindEvents();
}

function draw(){
  CX.clearRect(0,0,CC.width,CC.height);
  CX.drawImage(cImg,0,0,CC.width,CC.height);
  // sin overlay oscuro - imagen clara
  // imagen clara, sin oscurecer
  // borde
  CX.beginPath();
  cPts.forEach((p,i)=>i?CX.lineTo(p.x,p.y):CX.moveTo(p.x,p.y));
  CX.closePath(); CX.strokeStyle='#38BDF8'; CX.lineWidth=2.5; CX.stroke();
  // puntos
  cPts.forEach((p,i)=>{
    CX.beginPath(); CX.arc(p.x,p.y,14,0,Math.PI*2);
    CX.fillStyle=drag===i?'#818CF8':'#38BDF8'; CX.fill();
    CX.strokeStyle='#fff'; CX.lineWidth=2.5; CX.stroke();
    CX.strokeStyle='#fff'; CX.lineWidth=2;
    CX.beginPath(); CX.moveTo(p.x-5,p.y); CX.lineTo(p.x+5,p.y);
    CX.moveTo(p.x,p.y-5); CX.lineTo(p.x,p.y+5); CX.stroke();
  });
}

function pos(e,t){
  const r=CC.getBoundingClientRect();
  const sx=CC.width/r.width, sy=CC.height/r.height;
  const src=t||e;
  return{x:(src.clientX-r.left)*sx, y:(src.clientY-r.top)*sy};
}
function nearest(p){
  let bi=-1,bd=40;
  cPts.forEach((q,i)=>{const d=Math.hypot(q.x-p.x,q.y-p.y);if(d<bd){bd=d;bi=i;}});
  return bi;
}
function bindEvents(){
  CC.ontouchstart=e=>{e.preventDefault();drag=nearest(pos(e,e.touches[0]));draw();};
  CC.ontouchmove=e=>{e.preventDefault();if(drag<0)return;const p=pos(e,e.touches[0]);cPts[drag]={x:Math.max(0,Math.min(CC.width,p.x)),y:Math.max(0,Math.min(CC.height,p.y))};draw();};
  CC.ontouchend=()=>{drag=-1;draw();};
  CC.onmousedown=e=>{drag=nearest(pos(e));draw();};
  CC.onmousemove=e=>{if(drag<0)return;const p=pos(e);cPts[drag]={x:Math.max(0,Math.min(CC.width,p.x)),y:Math.max(0,Math.min(CC.height,p.y))};draw();};
  CC.onmouseup=()=>{drag=-1;};
}

function aplicar(){
  document.getElementById('cropOv').classList.remove('open');
  const pts=cPts.map(p=>({x:p.x/scale,y:p.y/scale}));
  const xs=pts.map(p=>p.x), ys=pts.map(p=>p.y);
  const x0=Math.max(0,Math.min(...xs));
  const y0=Math.max(0,Math.min(...ys));
  const x1=Math.min(cImg.naturalWidth, Math.max(...xs));
  const y1=Math.min(cImg.naturalHeight,Math.max(...ys));
  const w=Math.round(x1-x0), h=Math.round(y1-y0);
  if(w<10||h<10){skip();return;}

  // Canvas con filtro scanner aplicado
  const out=document.createElement('canvas');
  out.width=w; out.height=h;
  const octx=out.getContext('2d');
  // Aplicar filtro ANTES de dibujar
  octx.filter='grayscale(1) contrast(2.5) brightness(1.25)';
  octx.drawImage(cImg,x0,y0,w,h,0,0,w,h);
  octx.filter='none';

  const url=out.toDataURL('image/jpeg',0.92);
  addPage(url,true);
}

function aplicarFiltroScanner(ctx,w,h){
  const imgData=ctx.getImageData(0,0,w,h);
  const d=imgData.data;
  for(let i=0;i<d.length;i+=4){
    // Escala de grises
    const gray=d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114;
    // Contraste muy agresivo
    const contrast=2.8;
    const c=Math.min(255, Math.max(0, (gray-128)*contrast+128));
    // Umbral: fondo blanco puro, texto negro puro
    const v=c>175 ? 255 : c<85 ? 0 : Math.min(255,Math.max(0,(c-85)/(175-85)*255));
    d[i]=d[i+1]=d[i+2]=v;
  }
  ctx.putImageData(imgData,0,0);
}

function skip(){
  document.getElementById('cropOv').classList.remove('open');
  toDataUrl(pending).then(u=>addPage(u,false));
}

function addPage(url,cropped){
  pages.push({url,cropped}); blob=null;
  render(); updateBtns();
  showToast(cropped?'✅ Página recortada':'✅ Página agregada');
}

function render(){
  const g=document.getElementById('grid'),em=document.getElementById('empty'),sb=document.getElementById('sbar');
  document.getElementById('cnt').textContent=pages.length;
  if(!pages.length){g.style.display='none';em.style.display='flex';sb.style.display='none';return;}
  em.style.display='none';g.style.display='grid';sb.style.display='flex';
  g.innerHTML=pages.map((p,i)=>`
    <div class="pitem">
      <img src="${p.url}" alt="${i+1}" class="${p.cropped?'scanned':''}"/>
      <div class="pnum">${i+1}</div>
      <button class="pdel" onclick="del(${i})">✕</button>
      ${p.cropped?'<div class="pbadge">✓ Scanner</div>':''}
    </div>`).join('');
}
function del(i){pages.splice(i,1);blob=null;render();updateBtns();}
function limpiar(){if(!confirm('¿Eliminar todo?'))return;pages=[];blob=null;render();updateBtns();}
function updateBtns(){
  const hay=pages.length>0;
  document.getElementById('bpdf').disabled=!hay;
  document.getElementById('bupl').disabled=!hay||!token;
}

async function genPDF(){
  if(!pages.length)return;
  showToast('Generando PDF...',60000);
  showPbar(true);
  try{
    const{jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    for(let i=0;i<pages.length;i++){
      setPbar((i/pages.length)*100);
      if(i>0)pdf.addPage();
      const img=await loadImg(pages[i].url);
      const r=img.width/img.height,pw=210,ph=297;
      let w=pw,h=pw/r; if(h>ph){h=ph;w=ph*r;}
      pdf.addImage(pages[i].url,'JPEG',(pw-w)/2,(ph-h)/2,w,h,'','FAST');
    }
    setPbar(100); blob=pdf.output('blob');
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob); a.download=`scan_${fmt()}.pdf`; a.click();
    showToast('✅ PDF guardado');
    if(token)document.getElementById('bupl').disabled=false;
    document.getElementById('bshr').disabled=false;
  }catch(e){showToast('Error al generar PDF');console.error(e);}
  finally{showPbar(false);setPbar(0);}
}

async function compartir(){
  if(!blob){showToast("Generá el PDF primero");return;}
  const nombre=`scan_${fmt()}.pdf`;
  const file=new File([blob],nombre,{type:"application/pdf"});
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    try{await navigator.share({files:[file],title:"Documento escaneado",text:"Documento escaneado con Scanner — Pérez Aré"});}
    catch(e){if(e.name!=="AbortError")showToast("Error al compartir");}
  }else{
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=nombre;a.click();
    showToast("Descargado (compartir no disponible en este navegador)");
  }
}

function gapiLoaded(){
  gapi.load('client:auth2',async()=>{
    await gapi.client.init({clientId:CID,scope:DSCOPE});
    const a=gapi.auth2.getAuthInstance();
    if(a.isSignedIn.get()){token=a.currentUser.get().getAuthResponse().access_token;updDrive(true);}
    a.isSignedIn.listen(ok=>{token=ok?a.currentUser.get().getAuthResponse().access_token:null;updDrive(ok);});
  });
}
function updDrive(ok){
  document.getElementById('btnDrive').classList.toggle('on',ok);
  document.getElementById('drvLbl').textContent=ok?'✓ Drive':'☁ Drive';
  updateBtns();
}
async function conectarDrive(){
  if(!window.gapi?.auth2){showToast('Cargando...');setTimeout(conectarDrive,1500);return;}
  const a=gapi.auth2.getAuthInstance();
  if(a.isSignedIn.get()){if(confirm('¿Desconectar?'))await a.signOut();}
  else{try{await a.signIn();showToast('✅ Drive conectado');}catch(e){showToast('Error al conectar');}}
}
async function subirDrive(){
  if(!blob){showToast('Generá el PDF primero');return;}
  showToast('Subiendo...',60000); showPbar(true);
  try{
    const n=`scan_${fmt()}.pdf`,f=new FormData();
    f.append('metadata',new Blob([JSON.stringify({name:n,mimeType:'application/pdf'})],{type:'application/json'}));
    f.append('file',blob,n);
    const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{Authorization:`Bearer ${token}`},body:f});
    if(!r.ok)throw new Error(await r.text());
    setPbar(100);showToast('✅ Subido a Google Drive');
  }catch(e){showToast('Error al subir');console.error(e);}
  finally{showPbar(false);setPbar(0);}
}

function toDataUrl(f){return new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(f);});}
function loadImg(s){return new Promise((r,j)=>{const i=new Image();i.onload=()=>r(i);i.onerror=j;i.src=s;});}
function showPbar(s){document.getElementById('pbar').style.display=s?'block':'none';}
function setPbar(p){document.getElementById('pfill').style.width=p+'%';}
function fmt(){const d=new Date();return`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}`;}
</script>
<script src="https://apis.google.com/js/api.js?onload=gapiLoaded"></script>
