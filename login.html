<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PsicoApp — Ingresar</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <script src="/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:  #F472B6;
      --orange-d:#E76F51;
      --green:   #5B2FA8;
      --green-l: #6D28D9;
      --bg:      #FDF8F3;
      --card:    #FFFFFF;
      --text:    #1A2E24;
      --muted:   #8A8FA8;
      --border:  #E8E4DD;
      --err:     #B94A48;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* Fondo degradado con círculos decorativos */
    body::before {
      content: '';
      position: fixed;
      top: -150px; right: -150px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(244,114,182,0.2) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -150px; left: -150px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(91,47,168,0.15) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    .card {
      position: relative; z-index: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 2.8rem 2.5rem 2.5rem;
      width: 100%; max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08), 0 4px 16px rgba(244,114,182,0.1);
    }

    .logo {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 1.8rem;
      text-align: center;
    }
    .logo-icon {
      width: 100px; height: 100px;
      flex-shrink: 0;
      overflow: visible;
      margin-bottom: 10px;
    }
    .logo-icon img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 6px 16px rgba(244,114,182,0.45)); }
    .logo-text {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem;
      color: #1A2E24;
      letter-spacing: -.01em;
      line-height: 1;
    }
    .logo-text span { color: #F472B6; }
    .logo-tagline {
      font-size: 11px;
      color: #8A8FA8;
      font-weight: 600;
      margin-top: 5px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.7rem;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: .4rem;
    }
    .subtitle {
      font-size: .9rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    /* tabs */
    .tabs {
      display: flex;
      background: #F4F1ED;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 1.8rem;
      gap: 4px;
    }
    .tab {
      flex: 1; padding: .55rem;
      border: none; background: transparent;
      border-radius: 9px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: .875rem; font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
    }
    .tab.active {
      background: var(--card);
      color: var(--green);
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    /* form */
    .field { margin-bottom: 1.1rem; }
    label {
      display: block;
      font-size: .78rem; font-weight: 700;
      color: var(--muted);
      letter-spacing: .05em; text-transform: uppercase;
      margin-bottom: .45rem;
    }
    input {
      width: 100%;
      padding: .75rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: .95rem;
      color: var(--text);
      background: #FAFAF8;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(244,114,182,0.15);
      background: #fff;
    }
    input::placeholder { color: #C5C0B8; }

    .btn {
      width: 100%; padding: .85rem;
      border: none; border-radius: 12px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1rem; font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      margin-top: .3rem;
      display: flex; align-items: center; justify-content: center; gap: .5rem;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary,#5B2FA8) 0%, #7C3AED 100%);
      color: #fff;
      box-shadow: 0 4px 16px rgba(91,47,168,0.3);
    }
    .btn-primary:hover { 
      box-shadow: 0 6px 20px rgba(91,47,168,0.4);
      transform: translateY(-1px);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    /* spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* message */
    .msg {
      padding: .65rem .9rem;
      border-radius: 10px;
      font-size: .875rem;
      margin-bottom: 1rem;
      display: none;
      font-weight: 500;
    }
    .msg.error   { background: #fdf0ef; color: var(--err); border: 1px solid #f0c8c7; }
    .msg.success { background: #EDFBF3; color: var(--green); border: 1px solid #DDD6FE; }

    .divider {
      text-align: center;
      font-size: .78rem;
      color: var(--border);
      margin: 1.5rem 0 0;
    }
  </style>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#5B2FA8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/icon-192.png">
</head>
<body>

<div class="card">

  <div class="logo">
    <div class="logo-icon">
      <img src="https://raw.githubusercontent.com/estudionube82-cyber/psicoapp/main/logo-psicoapp.png" alt="PsicoApp" onerror="this.onerror=null;this.src='logo-psicoapp.png'">
    </div>
    <span class="logo-text">Psico<span>App</span></span>
    <span class="logo-tagline">Gestión para psicólogos</span>
  </div>

  <h1 style="text-align:center">Bienvenido</h1>
  <p class="subtitle" style="text-align:center">Tu consultorio, siempre organizado.</p>

  <div class="tabs">
    <button class="tab active" id="tab-login">Ingresar</button>
    <button class="tab" id="tab-register">Registrarse</button>
  </div>

  <div id="msg" class="msg"></div>

  <!-- LOGIN -->
  <div id="form-login">
    <div class="field">
      <label>Email</label>
      <input id="login-email" type="email" placeholder="tu@email.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn btn-primary" id="btn-login">
      <span class="spinner" id="spin-login"></span>
      <span id="lbl-login">Ingresar</span>
    </button>
    <p style="text-align:center;margin-top:1rem;">
      <a id="link-forgot" href="#" style="font-size:.82rem;color:var(--muted);text-decoration:none;font-weight:600;">¿Olvidaste tu contraseña?</a>
    </p>
  </div>

  <!-- REGISTER -->
  <div id="form-register" style="display:none">
    <div class="field">
      <label>Email</label>
      <input id="reg-email" type="email" placeholder="tu@email.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input id="reg-pass" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password"/>
    </div>
    <div class="field">
      <label>Confirmá la contraseña</label>
      <input id="reg-pass2" type="password" placeholder="Repetí la contraseña" autocomplete="new-password"/>
    </div>
    <button class="btn btn-primary" id="btn-reg">
      <span class="spinner" id="spin-reg"></span>
      <span id="lbl-reg">Crear cuenta</span>
    </button>
  </div>

  <!-- RECOVERY (nueva contraseña) -->
  <div id="form-recovery" style="display:none">
    <div class="field">
      <label>Nueva contraseña</label>
      <input id="rec-pass" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password"/>
    </div>
    <div class="field">
      <label>Confirmá la nueva contraseña</label>
      <input id="rec-pass2" type="password" placeholder="Repetí la contraseña" autocomplete="new-password"/>
    </div>
    <button class="btn btn-primary" id="btn-rec">
      <span class="spinner" id="spin-rec"></span>
      <span id="lbl-rec">Guardar nueva contraseña</span>
    </button>
  </div>

  <p class="divider">PsicoApp © 2026 · <a href="/privacidad.html" style="color:var(--muted);text-decoration:none;font-size:.75rem;font-weight:600;">Privacidad</a></p>
</div>

<script>
  /* ── Validación de config ───────────────────────────────────
   * PSICOAPP_CONFIG debe estar definido por /config.js antes de
   * que este script se ejecute. Fallamos rápido si no está.
   * ─────────────────────────────────────────────────────────── */
  if (!window.PSICOAPP_CONFIG?.SUPA_URL || !window.PSICOAPP_CONFIG?.SUPA_KEY) {
    document.body.innerHTML = '<p style="padding:2rem;color:red;font-family:sans-serif">Error: configuración no encontrada. Verificá que config.js esté cargando correctamente.</p>';
    throw new Error('[PsicoApp] PSICOAPP_CONFIG no está definido.');
  }

  const { createClient } = supabase;
  const sb = createClient(PSICOAPP_CONFIG.SUPA_URL, PSICOAPP_CONFIG.SUPA_KEY);

  /* ── Modo recuperación de contraseña ──────────────────────────
   * Supabase puede entregar el token de recovery de dos formas:
   *   a) Hash fragment: #access_token=...&type=recovery  (implicit flow)
   *   b) Evento onAuthStateChange con event === 'PASSWORD_RECOVERY' (PKCE)
   * Manejamos ambos para máxima compatibilidad.
   * ─────────────────────────────────────────────────────────── */
  let _isRecoveryMode = false;

  function showRecoveryForm() {
    if (_isRecoveryMode) return;
    _isRecoveryMode = true;
    document.querySelector('.tabs').style.display          = 'none';
    document.getElementById('form-login').style.display    = 'none';
    document.getElementById('form-register').style.display = 'none';
    document.querySelector('h1').textContent               = 'Nueva contraseña';
    document.querySelector('.subtitle').textContent        = 'Elegí una contraseña segura para tu cuenta.';
    document.getElementById('form-recovery').style.display = '';
    hideMsg();
  }

  // a) Hash fragment (implicit flow) — detección de recovery
  function checkHashRecovery() {
    const params = new URLSearchParams(window.location.hash.substring(1));
    if (params.get('type') === 'recovery' && params.get('access_token')) {
      showRecoveryForm();
      history.replaceState(null, '', window.location.pathname + window.location.search);
    }
  }
  checkHashRecovery();

  // b) PKCE flow — solo para recovery, nunca para redirects de sesión
  sb.auth.onAuthStateChange((event) => {
    if (event === 'PASSWORD_RECOVERY') showRecoveryForm();
  });

  /* ── Guard de sesión ─────────────────────────────────────────
   * Lock global: evita que dos ejecuciones concurrentes (por
   * doble carga de script o hot-reload) disparen el redirect
   * simultáneamente.
   * ─────────────────────────────────────────────────────────── */
  window._psicoRedirecting = window._psicoRedirecting || false;
  (async () => {
    if (window._psicoRedirecting) return;
    const { data } = await sb.auth.getSession();
    await new Promise(r => setTimeout(r, 50));
    if (data?.session && !_isRecoveryMode) {
      window._psicoRedirecting = true;
      window.location.replace('/');
    }
  })();

  /* ── Helpers UI ─────────────────────────────────────────── */
  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
    el.style.display = 'block';
  }
  function hideMsg() {
    document.getElementById('msg').style.display = 'none';
  }
  function setLoading(btnId, spinId, lblId, loading, label) {
    document.getElementById(btnId).disabled = loading;
    document.getElementById(spinId).style.display = loading ? 'block' : 'none';
    document.getElementById(lblId).textContent = loading ? '' : label;
  }

  function switchTab(t) {
    const isLogin = t === 'login';
    document.getElementById('tab-login').classList.toggle('active', isLogin);
    document.getElementById('tab-register').classList.toggle('active', !isLogin);
    document.getElementById('form-login').style.display    = isLogin ? '' : 'none';
    document.getElementById('form-register').style.display = isLogin ? 'none' : '';
    hideMsg();
  }

  /* ── Utilidades ─────────────────────────────────────────── */
  function withTimeout(promise, ms) {
    return Promise.race([
      promise,
      new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms))
    ]);
  }

  function translateError(msg) {
    if (msg.includes('Invalid login'))       return 'Email o contraseña incorrectos.';
    if (msg.includes('Email not confirmed')) return 'Confirmá tu email antes de ingresar.';
    if (msg.includes('already registered')) return 'Este email ya está registrado. Ingresá en lugar de registrarte.';
    if (msg.includes('Password should'))    return 'La contraseña debe tener al menos 6 caracteres.';
    return msg;
  }

  /* ── upsertProfile ──────────────────────────────────────────
   * Crea o actualiza la fila en `profiles` para el usuario.
   * Se llama después de login exitoso y después de registro
   * con confirmación automática (identities.length > 0).
   * Falla silenciosamente para no bloquear el redirect.
   * ─────────────────────────────────────────────────────────── */
  async function upsertProfile(user) {
    try {
      await sb.from('profiles').upsert(
        { id: user.id, email: user.email },
        { onConflict: 'id', ignoreDuplicates: false }
      );
    } catch(e) {
      console.warn('[PsicoApp] upsertProfile falló (no crítico):', e.message);
    }
  }

  /* ── Acciones de autenticación ──────────────────────────── */
  async function doLogin() {
    hideMsg();
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    if (!email || !pass) { showMsg('Completá email y contraseña.', 'error'); return; }

    setLoading('btn-login', 'spin-login', 'lbl-login', true, 'Ingresar');
    let data, error;
    try {
      ({ data, error } = await withTimeout(sb.auth.signInWithPassword({ email, password: pass }), 12000));
    } catch(e) {
      setLoading('btn-login', 'spin-login', 'lbl-login', false, 'Ingresar');
      showMsg(e.message === 'timeout'
        ? 'La conexión tardó demasiado. Verificá tu internet e intentá de nuevo.'
        : 'Error inesperado: ' + e.message, 'error');
      return;
    }
    setLoading('btn-login', 'spin-login', 'lbl-login', false, 'Ingresar');

    if (error) { showMsg(translateError(error.message), 'error'); return; }

    if (data?.user) await upsertProfile(data.user);
    window.location.replace('/');
  }

  async function doForgotPassword() {
    const email = document.getElementById('login-email').value.trim();
    if (!email) { showMsg('Ingresá tu email primero para recuperar la contraseña.', 'error'); return; }
    hideMsg();
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/login.html',
    });
    if (error) { showMsg(translateError(error.message), 'error'); return; }
    showMsg('Te enviamos un email para restablecer tu contraseña. Revisá tu bandeja.', 'success');
  }

  async function doRegister() {
    hideMsg();
    const email = document.getElementById('reg-email').value.trim();
    const pass  = document.getElementById('reg-pass').value;
    const pass2 = document.getElementById('reg-pass2').value;
    if (!email || !pass || !pass2) { showMsg('Completá todos los campos.', 'error'); return; }
    if (pass.length < 6) { showMsg('La contraseña debe tener al menos 6 caracteres.', 'error'); return; }
    if (pass !== pass2)  { showMsg('Las contraseñas no coinciden.', 'error'); return; }

    setLoading('btn-reg', 'spin-reg', 'lbl-reg', true, 'Crear cuenta');
    let data, error;
    try {
      ({ data, error } = await withTimeout(sb.auth.signUp({ email, password: pass }), 12000));
    } catch(e) {
      setLoading('btn-reg', 'spin-reg', 'lbl-reg', false, 'Crear cuenta');
      showMsg(e.message === 'timeout'
        ? 'La conexión tardó demasiado. Verificá tu internet e intentá de nuevo.'
        : 'Error inesperado: ' + e.message, 'error');
      return;
    }
    setLoading('btn-reg', 'spin-reg', 'lbl-reg', false, 'Crear cuenta');

    if (error) { showMsg(translateError(error.message), 'error'); return; }

    if (data?.user?.identities?.length === 0) {
      showMsg('Este email ya está registrado. Ingresá en lugar de registrarte.', 'error');
      return;
    }

    // Si confirmación de email está desactivada en Supabase, el usuario ya tiene sesión
    if (data?.user?.confirmed_at || data?.session) {
      await upsertProfile(data.user);
      window.location.replace('/');
      return;
    }

    showMsg('✅ ¡Cuenta creada! Revisá tu bandeja (y el spam) y hacé clic en el enlace para activar tu cuenta.', 'success');
    setTimeout(() => switchTab('login'), 4500);
  }

  async function doResetPassword() {
    hideMsg();
    const pass  = document.getElementById('rec-pass').value;
    const pass2 = document.getElementById('rec-pass2').value;
    if (!pass || !pass2) { showMsg('Completá ambos campos.', 'error'); return; }
    if (pass.length < 6) { showMsg('La contraseña debe tener al menos 6 caracteres.', 'error'); return; }
    if (pass !== pass2)  { showMsg('Las contraseñas no coinciden.', 'error'); return; }

    setLoading('btn-rec', 'spin-rec', 'lbl-rec', true, 'Guardar nueva contraseña');
    let error;
    try {
      ({ error } = await withTimeout(sb.auth.updateUser({ password: pass }), 12000));
    } catch(e) {
      setLoading('btn-rec', 'spin-rec', 'lbl-rec', false, 'Guardar nueva contraseña');
      showMsg(e.message === 'timeout'
        ? 'La conexión tardó demasiado. Verificá tu internet e intentá de nuevo.'
        : 'Error inesperado: ' + e.message, 'error');
      return;
    }
    setLoading('btn-rec', 'spin-rec', 'lbl-rec', false, 'Guardar nueva contraseña');

    if (error) { showMsg(translateError(error.message), 'error'); return; }

    showMsg('✅ ¡Contraseña actualizada! Ingresá con tu nueva contraseña.', 'success');
    await sb.auth.signOut();
    setTimeout(() => window.location.replace('/login.html'), 2000);
  }

  /* ── Event listeners centralizados ─────────────────────────
   * Sin onclick en HTML. Todo el binding aquí, en DOMContentLoaded.
   * ─────────────────────────────────────────────────────────── */
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('tab-login').addEventListener('click',    () => switchTab('login'));
    document.getElementById('tab-register').addEventListener('click', () => switchTab('register'));
    document.getElementById('btn-login').addEventListener('click',    doLogin);
    document.getElementById('btn-reg').addEventListener('click',      doRegister);
    document.getElementById('btn-rec').addEventListener('click',      doResetPassword);
    document.getElementById('link-forgot').addEventListener('click', (e) => {
      e.preventDefault();
      doForgotPassword();
    });

    // Enter key
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      if (_isRecoveryMode) { doResetPassword(); return; }
      const loginVisible = document.getElementById('form-login').style.display !== 'none';
      if (loginVisible) doLogin(); else doRegister();
    });
  });
</script>
</body>
</html>
