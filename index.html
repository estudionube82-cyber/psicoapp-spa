<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#5B2FA8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PsicoApp">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PsicoApp</title>

<!-- Fuentes (una sola carga, compartida por todas las vistas) -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,300;9..144,600;9..144,700&display=swap" rel="stylesheet">

<!-- Config y Supabase (una sola vez) -->
<script src="/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ══════════════════════════════════════════
   TOKENS GLOBALES — compartidos por todas las vistas
   ══════════════════════════════════════════ */
:root {
  --v1: #5B2FA8; --v2: #7C3AED; --v3: #A78BFA; --v4: #EDE9FE; --v5: #F5F3FF;
  --accent: #F472B6; --accent2: #34D399;
  --radius: 16px; --radius-sm: 11px;
  --font: 'Plus Jakarta Sans', sans-serif;
  --font-display: 'Fraunces', serif;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="light"] {
  --bg: #F8F7FF; --surface: #FFFFFF; --surface2: #F3F0FF;
  --border: #E5E2F5; --text: #1E1040; --text-muted: #7C6FAE;
  --shadow-sm: 0 2px 8px rgba(108,63,197,0.07);
  --shadow-md: 0 6px 24px rgba(108,63,197,0.12);
  --primary: #5B2FA8; --primary-light: #EDE9FE; --primary-mid: #A78BFA;
  --sb-bg: #1E1040; --sb-text: rgba(255,255,255,0.65);
  --sb-active: rgba(255,255,255,0.1); --sb-border: rgba(255,255,255,0.08);
  --accent-light: #FDE8F5; --danger: #E53E3E; --danger-light: #FFF5F5;
}
[data-theme="dark"] {
  --bg: #0F0B1E; --surface: #1A1530; --surface2: #221D3A;
  --border: #2E2850; --text: #EDE9FE; --text-muted: #9D8EC7;
  --shadow-sm: 0 2px 12px rgba(0,0,0,0.25);
  --shadow-md: 0 8px 32px rgba(0,0,0,0.4);
  --primary: #7C3AED; --primary-light: rgba(124,58,237,0.15); --primary-mid: #A78BFA;
  --sb-bg: #13102A; --sb-text: rgba(255,255,255,0.55);
  --sb-active: rgba(124,58,237,0.2); --sb-border: rgba(255,255,255,0.06);
  --accent-light: rgba(244,114,182,0.15); --danger: #FC8181; --danger-light: rgba(229,62,62,0.12);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

/* ══════════════════════════════════════════
   LAYOUT SHELL
   ══════════════════════════════════════════ */

/* Mobile: columna simple + bottom nav */
#shell { display: flex; flex-direction: column; min-height: 100vh; }
#view-container { flex: 1; padding-bottom: 72px; } /* espacio para bottom nav */

/* Desktop 768px+: sidebar + contenido */
@media (min-width: 768px) {
  #shell { flex-direction: row; }
  #view-container { flex: 1; max-width: none; padding-bottom: 0; overflow-y: auto; height: 100vh; }
  .bottom-nav { display: none !important; }
}

/* ══════════════════════════════════════════
   SIDEBAR (desktop)
   ══════════════════════════════════════════ */
.sidebar {
  display: none; /* oculta en mobile */
  flex-direction: column;
  width: 240px; min-width: 240px;
  height: 100vh;
  position: sticky; top: 0;
  background: var(--sb-bg);
  padding: 28px 0 20px;
  z-index: 100; overflow-y: auto;
}
@media (min-width: 768px) { .sidebar { display: flex; } }

.sb-logo {
  font-family: var(--font-display);
  font-size: 22px; font-weight: 700; color: white;
  padding: 0 24px 24px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  margin-bottom: 12px;
}
.sb-logo span { color: var(--v3); }

.sb-section {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .8px; color: rgba(255,255,255,0.3);
  padding: 14px 26px 6px;
}
.sb-nav { flex: 1; display: flex; flex-direction: column; gap: 2px; padding: 0 12px; }
.sb-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; border-radius: 12px;
  color: rgba(255,255,255,0.7);
  font-size: 14px; font-weight: 500;
  cursor: pointer; border: none; background: transparent;
  width: 100%; text-align: left;
  transition: background .15s, color .15s;
}
.sb-item:hover { background: rgba(255,255,255,0.1); color: white; }
/* ✅ FIX: color violeta en vez del verde viejo */
.sb-item.sb-active { background: rgba(124,58,237,0.3); color: white; }
.sb-icon { font-size: 18px; width: 24px; text-align: center; }

.sb-footer {
  padding: 16px 12px 0;
  border-top: 1px solid rgba(255,255,255,0.1);
  margin-top: 8px;
}
.sb-user {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: 12px;
  color: rgba(255,255,255,0.7); cursor: pointer;
  border: none; background: transparent; width: 100%;
}
.sb-user:hover { background: rgba(255,255,255,0.08); color: white; }
.sb-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--v2); display: flex; align-items: center;
  justify-content: center; font-size: 13px; font-weight: 700;
  color: white; flex-shrink: 0; overflow: hidden;
}
.sb-user-name { font-size: 13px; font-weight: 600; color: white; }
.sb-user-role { font-size: 11px; color: rgba(255,255,255,0.5); text-align: left; }

/* ══════════════════════════════════════════
   BOTTOM NAV (mobile)
   ══════════════════════════════════════════ */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 64px;
  background: var(--surface);
  border-top: 1.5px solid var(--border);
  display: flex; align-items: center;
  z-index: 2147483647;
  box-shadow: 0 -2px 12px rgba(0,0,0,0.09);
}
.bn-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 2px;
  color: #8A8FA8; cursor: pointer;
  border: none; background: transparent; padding: 4px 0;
  font-family: var(--font);
}
.bn-item .bn-icon { font-size: 22px; line-height: 1; display: block; }
.bn-item .bn-label { font-size: 10px; font-weight: 700; display: block; }
.bn-item.bn-active .bn-label { color: var(--primary); }
.bn-item.bn-active .bn-icon { filter: drop-shadow(0 0 4px rgba(92,47,168,0.5)); }

/* ══════════════════════════════════════════
   TRANSICIÓN ENTRE VISTAS
   ══════════════════════════════════════════ */
#view-container { position: relative; }
.view-section {
  display: none;
  animation: fadeIn 0.18s ease;
}
.view-section.view-active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.placeholder-view {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 60vh; gap: 12px;
  color: var(--text-muted); font-size: 15px;
}
.placeholder-view .ph-icon { font-size: 48px; }
.placeholder-view h2 { color: var(--text); font-size: 20px; }

/* ── Menú hamburguesa (bottom nav móvil) ── */
#bn-more-menu {
  position: fixed; bottom: 68px; right: 12px;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 16px; padding: 8px 0;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  z-index: 2147483647; min-width: 180px;
  display: none; flex-direction: column;
  animation: fadeIn .15s ease;
}
#bn-more-menu.open { display: flex; }
.bn-more-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 18px; font-size: 14px; font-weight: 600;
  color: var(--text); cursor: pointer; border: none;
  background: transparent; font-family: var(--font); width: 100%;
  text-align: left;
}
.bn-more-item:hover { background: var(--primary-light); }
.bn-more-item .bm-icon { font-size: 18px; width: 24px; text-align: center; }
#bn-more-overlay {
  display: none; position: fixed; inset: 0; z-index: 2147483646;
}
#bn-more-overlay.open { display: block; }
</style>
</head>
<body>

<div id="shell">

  <!-- ── SIDEBAR (desktop) ── -->
  <aside class="sidebar">
    <div class="sb-logo">Psico<span>App</span></div>

    <nav class="sb-nav">
      <div class="sb-section">Principal</div>
      <button class="sb-item" onclick="navigate('dashboard')" data-view="dashboard">
        <span class="sb-icon">🏠</span> Inicio
      </button>
      <button class="sb-item" onclick="navigate('agenda')" data-view="agenda">
        <span class="sb-icon">📅</span> Agenda
      </button>

      <div class="sb-section">Gestión</div>
      <button class="sb-item" onclick="navigate('pacientes')" data-view="pacientes">
        <span class="sb-icon">👥</span> Pacientes
      </button>
      <button class="sb-item" onclick="navigate('whatsapp')" data-view="whatsapp">
        <span class="sb-icon">💬</span> WhatsApp
      </button>
      <button class="sb-item" onclick="navigate('pagos')" data-view="pagos">
        <span class="sb-icon">💰</span> Pagos
      </button>

      <div class="sb-section">Cuenta</div>
      <button class="sb-item" onclick="navigate('perfil')" data-view="perfil">
        <span class="sb-icon">🪪</span> Perfil
      </button>
      <button class="sb-item" onclick="navigate('cuenta')" data-view="cuenta">
        <span class="sb-icon">⭐</span> Suscripción
      </button>
    </nav>

    <div class="sb-footer">
      <button class="sb-user" onclick="navigate('perfil')">
        <div class="sb-avatar" id="sb-avatar-initials">?</div>
        <div>
          <div class="sb-user-name" id="sb-user-name">Cargando…</div>
          <div class="sb-user-role">Psicólogo/a</div>
        </div>
      </button>
    </div>
  </aside>

  <!-- ── CONTENEDOR DE VISTAS ── -->
  <main id="view-container">

    <section id="view-dashboard" class="view-section"></section>
    <section id="view-pacientes" class="view-section"></section>
    <section id="view-agenda"    class="view-section"></section>
    <section id="view-whatsapp"  class="view-section"></section>
    <section id="view-pagos"     class="view-section"></section>
    <section id="view-perfil"    class="view-section"></section>
    <section id="view-cuenta"    class="view-section"></section>

  </main>

  <!-- ── BOTTOM NAV (mobile) ── -->
  <!-- Overlay para cerrar menú -->
  <div id="bn-more-overlay" onclick="closeBnMore()"></div>

  <!-- Menú desplegable Más -->
  <div id="bn-more-menu">
    <button class="bn-more-item" onclick="closeBnMore();navigate('pagos')">
      <span class="bm-icon">💰</span> Pagos
    </button>
    <button class="bn-more-item" onclick="closeBnMore();navigate('perfil')" data-view="perfil">
      <span class="bm-icon">🪪</span> Perfil
    </button>
    <button class="bn-more-item" onclick="closeBnMore();navigate('cuenta')" data-view="cuenta">
      <span class="bm-icon">⭐</span> Suscripción
    </button>
  </div>

  <nav class="bottom-nav">
    <button class="bn-item" onclick="navigate('dashboard')" data-view="dashboard">
      <span class="bn-icon">🏠</span><span class="bn-label">Inicio</span>
    </button>
    <button class="bn-item" onclick="navigate('agenda')" data-view="agenda">
      <span class="bn-icon">📅</span><span class="bn-label">Agenda</span>
    </button>
    <button class="bn-item" onclick="navigate('pacientes')" data-view="pacientes">
      <span class="bn-icon">👥</span><span class="bn-label">Pacientes</span>
    </button>
    <button class="bn-item" onclick="navigate('whatsapp')" data-view="whatsapp">
      <span class="bn-icon">💬</span><span class="bn-label">WhatsApp</span>
    </button>
    <button class="bn-item" id="bn-btn-more" onclick="toggleBnMore()">
      <span class="bn-icon">☰</span><span class="bn-label">Más</span>
    </button>
  </nav>

</div><!-- /#shell -->

<!-- ══════════════════════════════════════════
     SCRIPTS GLOBALES
     ══════════════════════════════════════════ -->
<script>
/* ── SUPABASE ── */
const { createClient } = supabase;
const sb = createClient(PSICOAPP_CONFIG.SUPA_URL, PSICOAPP_CONFIG.SUPA_KEY);

/* ── TEMA ── */
(function() {
  const saved = localStorage.getItem('psicoapp-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
})();

function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', next);
  localStorage.setItem('psicoapp-theme', next);
  const th = document.getElementById('toggle-thumb');
  if (th) th.textContent = next === 'dark' ? '🌙' : '☀️';
}

/* ── AUTH GUARD + CARGA DE SUSCRIPCIÓN ── */
sb.auth.getSession().then(async ({ data }) => {
  if (!data.session) { window.location.href = 'login.html'; return; }

  // Cargar plan y usos desde Supabase y sincronizar localStorage
  try {
    const userId = data.session.user.id;
    const { data: perfil } = await sb
      .from('profiles')
      .select('plan, wa_usos, wa_extra')
      .eq('id', userId)
      .maybeSingle();

    if (perfil) {
      // Preservar fechaInicio si ya existe en localStorage
      let sus = {};
      try { sus = JSON.parse(localStorage.getItem('suscripcion')) || {}; } catch {}

      const planActual = perfil.plan || 'free';
      localStorage.setItem('suscripcion', JSON.stringify({
        plan:        planActual,
        estado:      'activa',
        fechaInicio: sus.fechaInicio || new Date().toISOString(),
        usos:        { whatsapp: perfil.wa_usos || 0, informesIA: sus.usos?.informesIA || 0 },
        extra:       { whatsapp: perfil.wa_extra || 0 },
      }));
    }
  } catch(e) {
    console.warn('[Auth] No se pudo sincronizar suscripción:', e.message);
  }
});

/* ── SIDEBAR: cargar perfil ── */
function syncSidebarPerfil() {
  try {
    const p = JSON.parse(localStorage.getItem('perfil')) || {};
    const nameEl   = document.getElementById('sb-user-name');
    const avatarEl = document.getElementById('sb-avatar-initials');
    if (nameEl) nameEl.textContent = p.nombre || 'Mi perfil';
    if (avatarEl) {
      if (p.foto) {
        avatarEl.innerHTML = `<img src="${p.foto}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
      } else {
        avatarEl.innerHTML = `<span>${p.nombre ? p.nombre.slice(0, 2).toUpperCase() : '👤'}</span>`;
      }
    }
  } catch(e) {}
}
syncSidebarPerfil();
window.addEventListener('perfilActualizado', syncSidebarPerfil);

/* ── SINCRONIZAR wa_usos A SUPABASE ── */
// Se llama desde view-agenda.js y view-whatsapp.js después de enviar WA
window._syncWaUsos = async function() {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return;
    let sus = {};
    try { sus = JSON.parse(localStorage.getItem('suscripcion')) || {}; } catch {}
    const usos = sus.usos?.whatsapp || 0;
    await sb.from('profiles').update({ wa_usos: usos }).eq('id', session.user.id);
  } catch(e) {
    console.warn('[WA] No se pudo sincronizar wa_usos:', e.message);
  }
};
const VISTAS_VALIDAS = ['dashboard','agenda','pacientes','whatsapp','pagos','perfil','cuenta'];
let _currentView = null;

function navigate(viewId) {
  if (!VISTAS_VALIDAS.includes(viewId)) viewId = 'dashboard';
  if (viewId === _currentView) return;

  /* Ocultar vista anterior */
  if (_currentView) {
    const prev = document.getElementById('view-' + _currentView);
    if (prev) prev.classList.remove('view-active');
  }

  /* Mostrar nueva */
  const next = document.getElementById('view-' + viewId);
  if (!next) { console.warn('Vista no encontrada:', viewId); return; }
  next.classList.add('view-active');

  _currentView = viewId;

  /* Actualizar nav activo */
  document.querySelectorAll('[data-view]').forEach(el => {
    el.classList.toggle('sb-active', el.dataset.view === viewId);
    el.classList.toggle('bn-active', el.dataset.view === viewId);
  });

  /* Actualizar URL sin recargar */
  history.pushState({ view: viewId }, '', '/?v=' + viewId);

  /* Llamar hook de la vista */
  const hook = window['onViewEnter_' + viewId];
  if (typeof hook === 'function') hook();

  /* Scroll arriba */
  const container = document.getElementById('view-container');
  if (container) container.scrollTop = 0;
}

/* Manejar botón Atrás del navegador */
window.addEventListener('popstate', (e) => {
  const viewId = e.state?.view || 'dashboard';
  navigate(viewId);
});

/* ── INIT: leer vista desde URL o ir a dashboard ── */
document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const vistaUrl = params.get('v');
  const vistaInicial = VISTAS_VALIDAS.includes(vistaUrl) ? vistaUrl : 'dashboard';
  navigate(vistaInicial);
});
</script>

<!-- Scripts de vistas -->
<script src="suscripcion-control.js"  onerror="console.warn('suscripcion-control.js no encontrado')"></script>
<script src="view-dashboard.js"       onerror="console.warn('view-dashboard.js no encontrado')"></script>
<script src="view-pacientes.js"       onerror="console.warn('view-pacientes.js no encontrado')"></script>
<script src="view-agenda.js"          onerror="console.warn('view-agenda.js no encontrado')"></script>
<script src="view-whatsapp.js"        onerror="console.warn('view-whatsapp.js no encontrado')"></script>
<script src="view-pagos.js"           onerror="console.warn('view-pagos.js no encontrado')"></script>
<script src="view-cuenta.js"          onerror="console.warn('view-cuenta.js no encontrado')"></script>
<script src="view-perfil.js"          onerror="console.warn('view-perfil.js no encontrado')"></script>


<script>
  // Registro del Service Worker (PWA)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('[SW] Registrado:', reg.scope))
        .catch(e  => console.warn('[SW] Error:', e));
    });
  }

  // Hamburguesa bottom nav
  function toggleBnMore() {
    const menu = document.getElementById('bn-more-menu');
    const overlay = document.getElementById('bn-more-overlay');
    const btn = document.getElementById('bn-btn-more');
    const isOpen = menu.classList.contains('open');
    menu.classList.toggle('open', !isOpen);
    overlay.classList.toggle('open', !isOpen);
    btn.classList.toggle('bn-active', !isOpen);
  }
  function closeBnMore() {
    document.getElementById('bn-more-menu')?.classList.remove('open');
    document.getElementById('bn-more-overlay')?.classList.remove('open');
    document.getElementById('bn-btn-more')?.classList.remove('bn-active');
  }
</script>
</body>
</html>
