<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PsicoApp</title>

<!-- Fuentes (una sola carga, compartida por todas las vistas) -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,300;9..144,600;9..144,700&display=swap" rel="stylesheet">

<!-- Config y Supabase (una sola vez) -->
<script src="/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ══════════════════════════════════════════
   TOKENS GLOBALES — compartidos por todas las vistas
   ══════════════════════════════════════════ */
:root {
  --v1: #5B2FA8; --v2: #7C3AED; --v3: #A78BFA; --v4: #EDE9FE; --v5: #F5F3FF;
  --accent: #F472B6; --accent2: #34D399;
  --radius: 16px; --radius-sm: 11px;
  --font: 'Plus Jakarta Sans', sans-serif;
  --font-display: 'Fraunces', serif;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="light"] {
  --bg: #F8F7FF; --surface: #FFFFFF; --surface2: #F3F0FF;
  --border: #E5E2F5; --text: #1E1040; --text-muted: #7C6FAE;
  --shadow-sm: 0 2px 8px rgba(108,63,197,0.07);
  --shadow-md: 0 6px 24px rgba(108,63,197,0.12);
  --primary: #5B2FA8; --primary-light: #EDE9FE; --primary-mid: #A78BFA;
  --sb-bg: #1E1040; --sb-text: rgba(255,255,255,0.65);
  --sb-active: rgba(255,255,255,0.1); --sb-border: rgba(255,255,255,0.08);
  --accent-light: #FDE8F5; --danger: #E53E3E; --danger-light: #FFF5F5;
}
[data-theme="dark"] {
  --bg: #0F0B1E; --surface: #1A1530; --surface2: #221D3A;
  --border: #2E2850; --text: #EDE9FE; --text-muted: #9D8EC7;
  --shadow-sm: 0 2px 12px rgba(0,0,0,0.25);
  --shadow-md: 0 8px 32px rgba(0,0,0,0.4);
  --primary: #7C3AED; --primary-light: rgba(124,58,237,0.15); --primary-mid: #A78BFA;
  --sb-bg: #13102A; --sb-text: rgba(255,255,255,0.55);
  --sb-active: rgba(124,58,237,0.2); --sb-border: rgba(255,255,255,0.06);
  --accent-light: rgba(244,114,182,0.15); --danger: #FC8181; --danger-light: rgba(229,62,62,0.12);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

/* ══════════════════════════════════════════
   LAYOUT SHELL
   ══════════════════════════════════════════ */

/* Mobile: columna simple + bottom nav */
#shell { display: flex; flex-direction: column; min-height: 100vh; }
#view-container { flex: 1; padding-bottom: 72px; } /* espacio para bottom nav */

/* Desktop 768px+: sidebar + contenido */
@media (min-width: 768px) {
  #shell { flex-direction: row; }
  #view-container { flex: 1; max-width: none; padding-bottom: 0; overflow-y: auto; height: 100vh; }
  .bottom-nav { display: none !important; }
  .bn-more-overlay { display: none !important; }
  .bn-more-sheet { display: none !important; }
}

/* ══════════════════════════════════════════
   SIDEBAR (desktop)
   ══════════════════════════════════════════ */
.sidebar {
  display: none; /* oculta en mobile */
  flex-direction: column;
  width: 240px; min-width: 240px;
  height: 100vh;
  position: sticky; top: 0;
  background: var(--sb-bg);
  padding: 28px 0 20px;
  z-index: 100; overflow-y: auto;
}
@media (min-width: 768px) { .sidebar { display: flex; } }

.sb-logo {
  font-family: var(--font-display);
  font-size: 22px; font-weight: 700; color: white;
  padding: 0 24px 24px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  margin-bottom: 12px;
}
.sb-logo span { color: var(--v3); }

.sb-section {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .8px; color: rgba(255,255,255,0.3);
  padding: 14px 26px 6px;
}
.sb-nav { flex: 1; display: flex; flex-direction: column; gap: 2px; padding: 0 12px; }
.sb-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; border-radius: 12px;
  color: rgba(255,255,255,0.7);
  font-size: 14px; font-weight: 500;
  cursor: pointer; border: none; background: transparent;
  width: 100%; text-align: left;
  transition: background .15s, color .15s;
}
.sb-item:hover { background: rgba(255,255,255,0.1); color: white; }
/* ✅ FIX: color violeta en vez del verde viejo */
.sb-item.sb-active { background: rgba(124,58,237,0.3); color: white; }
.sb-icon { font-size: 18px; width: 24px; text-align: center; }

.sb-footer {
  padding: 16px 12px 0;
  border-top: 1px solid rgba(255,255,255,0.1);
  margin-top: 8px;
}
.sb-user {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: 12px;
  color: rgba(255,255,255,0.7); cursor: pointer;
  border: none; background: transparent; width: 100%;
}
.sb-user:hover { background: rgba(255,255,255,0.08); color: white; }
.sb-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--v2); display: flex; align-items: center;
  justify-content: center; font-size: 13px; font-weight: 700;
  color: white; flex-shrink: 0; overflow: hidden;
}
.sb-user-name { font-size: 13px; font-weight: 600; color: white; }
.sb-user-role { font-size: 11px; color: rgba(255,255,255,0.5); text-align: left; }

/* ══════════════════════════════════════════
   BOTTOM NAV (mobile)
   ══════════════════════════════════════════ */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 64px;
  background: var(--surface);
  border-top: 1.5px solid var(--border);
  display: flex; align-items: center;
  z-index: 2147483647;
  box-shadow: 0 -2px 12px rgba(0,0,0,0.09);
}
.bn-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 2px;
  color: #8A8FA8; cursor: pointer;
  border: none; background: transparent; padding: 4px 0;
  font-family: var(--font);
}
.bn-item .bn-icon { font-size: 22px; line-height: 1; display: block; }
.bn-item .bn-label { font-size: 10px; font-weight: 700; display: block; }
.bn-item.bn-active .bn-label { color: var(--primary); }
.bn-item.bn-active .bn-icon { filter: drop-shadow(0 0 4px rgba(92,47,168,0.5)); }

/* ── MENÚ MÁS (mobile) ── */
.bn-more-overlay {
  display: none; position: fixed; inset: 0; z-index: 2147483640;
  background: rgba(0,0,0,0.45);
}
.bn-more-overlay.open { display: block; }
.bn-more-sheet {
  position: fixed; bottom: 64px; left: 0; right: 0;
  background: var(--surface); border-radius: 20px 20px 0 0;
  padding: 16px 12px 8px; z-index: 2147483646;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.15);
  transform: translateY(100%);
  transition: transform .25s cubic-bezier(0.4,0,0.2,1);
}
.bn-more-sheet.open { transform: translateY(0); }
.bn-more-title {
  font-size: 11px; font-weight: 800; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: .8px; padding: 0 8px 10px;
}
.bn-more-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
.bn-more-item {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 4px; padding: 12px 4px;
  border: none; background: transparent; border-radius: 12px;
  cursor: pointer; font-family: var(--font); transition: background .15s;
}
.bn-more-item:active { background: var(--primary-light); }
.bn-more-item .bm-icon { font-size: 24px; line-height: 1; }
.bn-more-item .bm-label { font-size: 10px; font-weight: 700; color: var(--text-muted); }

/* ══════════════════════════════════════════
   TRANSICIÓN ENTRE VISTAS
   ══════════════════════════════════════════ */
#view-container { position: relative; }
.view-section {
  display: none;
  animation: fadeIn 0.18s ease;
}
.view-section.view-active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.placeholder-view {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 60vh; gap: 12px;
  color: var(--text-muted); font-size: 15px;
}
.placeholder-view .ph-icon { font-size: 48px; }
.placeholder-view h2 { color: var(--text); font-size: 20px; }
</style>

<!-- ══════════════════════════════════════════
     SCRIPTS GLOBALES
     ══════════════════════════════════════════ -->
<script>
/* ── REDIRECCIÓN AUTOMÁTICA DE RUTAS LEGACY ── */
// Si alguien entra directamente a /psicoapp-historia.html, etc.,
// se lo redirige a la SPA con la vista correcta.
(function() {
  const path = window.location.pathname;
  const match = path.match(/\/psicoapp-([a-z]+)\.html/i);
  if (match) {
    const viewName = match[1].toLowerCase();
    const validViews = [
      'dashboard','agenda','pacientes','historia',
      'whatsapp','pagos','informes','pericias','perfil','cuenta'
    ];
    const dest = validViews.includes(viewName) ? viewName : 'dashboard';
    window.location.replace('/?v=' + dest);
  }
})();

/* ── ACTIVACIÓN DE PLAN ──────────────────────────────────────
 * La activación del plan se realiza ÚNICAMENTE desde el backend
 * mediante webhook de MercadoPago → Edge Function → users_plan.
 * ─────────────────────────────────────────────────────────── */

/* ── SUPABASE ── */
const { createClient } = supabase;
const sb = createClient(PSICOAPP_CONFIG.SUPA_URL, PSICOAPP_CONFIG.SUPA_KEY);

/* ── TEMA ── */
(function() {
  const saved = localStorage.getItem('psicoapp-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
})();

function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', next);
  localStorage.setItem('psicoapp-theme', next);
  const th = document.getElementById('toggle-thumb');
  if (th) th.textContent = next === 'dark' ? '🌙' : '☀️';
}

/* ── AUTH GUARD + CARGA DE SUSCRIPCIÓN ──────────────────────
 * _psicoAuthReady es una Promise que se resuelve solo cuando
 * getSession() confirma sesión válida. El router la espera
 * antes de navegar, eliminando la race condition que causaba
 * el loop login ↔ dashboard.
 * ─────────────────────────────────────────────────────────── */
window._psicoAuthReady = new Promise((resolve) => {
  sb.auth.getSession().then(async ({ data }) => {
    const session = data?.session;

    if (!session) {
      window.location.replace('/login.html');
      return; // no resolver — la página cambia de todas formas
    }

    // Exponer userId para el store del router
    window._psicoUserId = session.user.id;

    // ── FALLBACK: verificar/crear perfil si no existe ────────
    // Cubre usuarios registrados antes del trigger SQL.
    try {
      const { data: perfilExistente } = await sb
        .from('profiles')
        .select('id')
        .eq('id', session.user.id)
        .maybeSingle();

      if (!perfilExistente) {
        // Perfil no existe → crearlo con valores seguros
        await sb.from('profiles').insert({
          id:         session.user.id,
          email:      session.user.email,
          plan:       'free',
          created_at: new Date().toISOString(),
        });
        console.log('[Auth] ✅ Perfil creado automáticamente');
      }
    } catch(e) {
      console.warn('[Auth] No se pudo verificar/crear perfil:', e.message);
    }

    // Plan cargado bajo demanda desde PlanService (Edge Function getUserPlan)
    // No se guarda en localStorage — el backend es la única fuente de verdad

    resolve(); // auth confirmado → el router puede navegar
  });
});

/* ── SIDEBAR: cargar perfil ──
   Lee desde PsicoRouter.store.perfil (fuente de verdad en memoria).
   Si el store aún no tiene datos, los pide a Supabase via ensurePerfil().
   Nunca lee de localStorage (datos siempre stale).
──────────────────────────────────────────────────────── */
async function syncSidebarPerfil() {
  try {
    /* Intentar desde el store en memoria primero (O(1), sin red) */
    let p = PsicoRouter?.store?.perfil;

    /* Si el store no tiene datos todavía, pedirlos a Supabase */
    if (!p || Object.keys(p).length === 0) {
      p = await PsicoRouter.store.ensurePerfil();
    }

    const nombre = p?.nombre_completo || p?.nombre || '';
    const foto   = p?.foto_url || p?.foto || null;

    const nameEl   = document.getElementById('sb-user-name');
    const avatarEl = document.getElementById('sb-avatar-initials');
    if (nameEl)   nameEl.textContent = nombre || 'Mi perfil';
    if (avatarEl) {
      avatarEl.innerHTML = foto
        ? `<img src="${foto}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
        : `<span>${nombre ? nombre.slice(0, 2).toUpperCase() : '👤'}</span>`;
    }
  } catch(e) {
    console.warn('[Sidebar] No se pudo sincronizar perfil:', e.message);
  }
}

/* Ejecutar al inicio (espera auth) y ante cada cambio de perfil */
window._psicoAuthReady?.then(() => syncSidebarPerfil());
window.addEventListener('storeUpdated', (e) => {
  if (e.detail?.type === 'perfil') syncSidebarPerfil();
});

/* ── SINCRONIZAR wa_usos A SUPABASE ── */
// Se llama desde view-agenda.js y view-whatsapp.js después de enviar WA
window._syncWaUsos = async function() {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return;
    let sus = {};
    try { sus = JSON.parse(localStorage.getItem('suscripcion')) || {}; } catch {}
    const usos = sus.usos?.whatsapp || 0;
    await sb.from('profiles').update({ wa_usos: usos }).eq('id', session.user.id);
  } catch(e) {
    console.warn('[WA] No se pudo sincronizar wa_usos:', e.message);
  }
};
/* ── Menú Más (mobile) ── */
function bnMoreOpen() {
  document.getElementById('bn-more-overlay').classList.add('open');
  document.getElementById('bn-more-sheet').classList.add('open');
}
function bnMoreClose() {
  document.getElementById('bn-more-overlay').classList.remove('open');
  document.getElementById('bn-more-sheet').classList.remove('open');
}
function bnMoreNav(view) {
  bnMoreClose();
  navigate(view);
}
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('bn-mas-btn').addEventListener('click', bnMoreOpen);
  document.getElementById('bn-more-overlay').addEventListener('click', bnMoreClose);

});

/* ── navigate() y router — gestionados por app-router.js ──
   app-router.js define navigate() globalmente y maneja:
   - ciclo de vida init/onEnter/onLeave por vista
   - popstate (botón Atrás)
   - DOMContentLoaded (vista inicial desde URL)
   - store global de datos (pacientes, perfil)
*/
</script>
