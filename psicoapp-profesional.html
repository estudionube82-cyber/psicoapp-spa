<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PsicoApp — Perfil Profesional</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --verde: #3a7d1e;
      --verde-claro: #f0f7e8;
      --verde-medio: #f5821f;
      --texto: #1a1a2e;
      --gris: #6b7280;
      --gris-claro: #f4f6f5;
      --borde: #e0e8d8;
      --blanco: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--gris-claro);
      color: var(--texto);
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      background: var(--blanco);
      border-bottom: 1px solid var(--borde);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--verde);
      letter-spacing: -0.5px;
    }
    .header-logo span { color: var(--verde-medio); }

    /* HERO CARD */
    .hero {
      max-width: 900px;
      margin: 36px auto 0;
      padding: 0 20px;
    }

    .hero-card {
      background: var(--blanco);
      border-radius: 20px;
      border: 1px solid var(--borde);
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(42,127,98,0.07);
    }

    .hero-banner {
      height: 90px;
      background: linear-gradient(135deg, #3a7d1e 0%, #f5821f 100%);
      position: relative;
    }

    .hero-body {
      padding: 0 32px 32px;
      display: flex;
      gap: 28px;
      align-items: flex-start;
    }

    .avatar-wrap {
      margin-top: -40px;
      flex-shrink: 0;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 4px solid var(--blanco);
      background: var(--verde);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: var(--blanco);
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero-info {
      padding-top: 16px;
      flex: 1;
    }

    .hero-info h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.7rem;
      color: var(--texto);
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .hero-titulo {
      color: var(--verde);
      font-size: 0.95rem;
      font-weight: 500;
      margin-top: 4px;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 12px;
    }

    .hero-meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.88rem;
      color: var(--gris);
    }

    .hero-meta-item svg {
      width: 15px;
      height: 15px;
      color: var(--verde-medio);
      flex-shrink: 0;
    }

    .matriculas {
      margin-top: 10px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .matricula-badge {
      background: var(--verde-claro);
      color: var(--verde);
      font-size: 0.78rem;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid #c3e0d8;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 14px;
    }

    .tag {
      background: var(--gris-claro);
      color: var(--texto);
      font-size: 0.8rem;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--borde);
    }

    /* WHATSAPP BUTTON */
    .wapp-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #25d366;
      color: white;
      font-weight: 500;
      font-size: 0.9rem;
      padding: 10px 20px;
      border-radius: 50px;
      text-decoration: none;
      margin-top: 18px;
      transition: background 0.2s, transform 0.15s;
      border: none;
      cursor: pointer;
    }
    .wapp-btn:hover { background: #1db954; transform: translateY(-1px); }
    .wapp-btn svg { width: 18px; height: 18px; }

    /* CONTENT GRID */
    .content-grid {
      max-width: 900px;
      margin: 24px auto 40px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 20px;
      align-items: start;
    }

    @media (max-width: 680px) {
      .content-grid { grid-template-columns: 1fr; }
      .hero-body { flex-direction: column; gap: 0; }
      .hero-info h1 { font-size: 1.35rem; }
    }

    /* SECTION CARD */
    .section-card {
      background: var(--blanco);
      border-radius: 16px;
      border: 1px solid var(--borde);
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(42,127,98,0.05);
    }

    .section-header {
      padding: 18px 24px 14px;
      border-bottom: 1px solid var(--borde);
    }

    .section-header h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.15rem;
      color: var(--texto);
    }

    .section-body {
      padding: 20px 24px;
    }

    .section-body p {
      font-size: 0.92rem;
      line-height: 1.7;
      color: #374151;
    }

    /* ACCORDION */
    .accordion-item {
      border-bottom: 1px solid var(--borde);
    }
    .accordion-item:last-child { border-bottom: none; }

    .accordion-trigger {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.93rem;
      font-weight: 500;
      color: var(--texto);
      transition: background 0.15s;
    }
    .accordion-trigger:hover { background: var(--verde-claro); }

    .accordion-icon {
      width: 20px;
      height: 20px;
      color: var(--verde);
      transition: transform 0.25s;
      flex-shrink: 0;
    }
    .accordion-item.open .accordion-icon { transform: rotate(180deg); }

    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .accordion-item.open .accordion-content { max-height: 400px; }

    .accordion-inner {
      padding: 4px 24px 20px;
      font-size: 0.9rem;
      line-height: 1.7;
      color: #4b5563;
    }

    /* SIDEBAR */
    .sidebar { display: flex; flex-direction: column; gap: 18px; }

    .info-card {
      background: var(--blanco);
      border-radius: 16px;
      border: 1px solid var(--borde);
      padding: 20px;
      box-shadow: 0 2px 12px rgba(42,127,98,0.05);
    }

    .info-card h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 1rem;
      color: var(--texto);
      margin-bottom: 14px;
    }

    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--borde);
      font-size: 0.88rem;
    }
    .info-row:last-child { border-bottom: none; padding-bottom: 0; }

    .info-row svg {
      width: 16px;
      height: 16px;
      color: var(--verde-medio);
      flex-shrink: 0;
      margin-top: 1px;
    }

    .info-label {
      color: var(--gris);
      font-size: 0.78rem;
      margin-bottom: 1px;
    }

    .info-value {
      color: var(--texto);
      font-weight: 500;
    }

    /* SKELETON */
    .skeleton {
      background: linear-gradient(90deg, #e8f0ed 25%, #d4e8e0 50%, #e8f0ed 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.8rem;
      color: var(--gris);
      border-top: 1px solid var(--borde);
      background: var(--blanco);
      margin-top: 20px;
    }
    footer a { color: var(--verde); text-decoration: none; }

    /* NOT FOUND */
    .not-found {
      text-align: center;
      padding: 80px 20px;
    }
    .not-found h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      color: var(--texto);
      margin-bottom: 10px;
    }
    .not-found p { color: var(--gris); }
  </style>
</head>

    const bloques = p.bloques_info ? (typeof p.bloques_info === 'string' ? JSON.parse(p.bloques_info) : p.bloques_info) : [];

    const avatarHtml = foto
      ? `<img src="${foto}" alt="${nombre}" />`
      : iniciales;

    const matriculasHtml = (matriculaP || matriculaN) ? `
      <div class="matriculas">
        ${matriculaP ? `<span class="matricula-badge">M.P. ${matriculaP}</span>` : ''}
        ${matriculaN ? `<span class="matricula-badge">M.N. ${matriculaN}</span>` : ''}
      </div>` : '';

    const wappLink = telefono
      ? `https://wa.me/549${telefono.replace(/\D/g,'')}?text=${encodeURIComponent('Hola, vi tu perfil en PsicoApp y quisiera consultar sobre turnos.')}`
      : '#';

    const bloquesHtml = bloques.length ? bloques.map(b => `
      <div class="accordion-item">
        <button class="accordion-trigger" onclick="toggleAccordion(this)">
          ${b.titulo}
          <svg class="accordion-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="accordion-content">
          <div class="accordion-inner">${b.contenido || ''}</div>
        </div>
      </div>
    `).join('') : '';

    app.innerHTML = `
      <!-- HERO -->
      <div class="hero">
        <div class="hero-card">
          <div class="hero-banner"></div>
          <div class="hero-body">
            <div class="avatar-wrap">
              <div class="avatar">${avatarHtml}</div>
            </div>
            <div class="hero-info">
              <h1>${nombre}</h1>
              <div class="hero-titulo">${titulo}</div>
              <div class="hero-meta">
                ${email ? `<div class="hero-meta-item">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
                  ${email}
                </div>` : ''}
                ${ciudad ? `<div class="hero-meta-item">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                  ${ciudad}
                </div>` : ''}
              </div>
              ${matriculasHtml}
              ${telefono ? `<a class="wapp-btn" href="${wappLink}" target="_blank">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12.004 2C6.477 2 2 6.477 2 12.004c0 1.867.506 3.613 1.382 5.12L2 22l4.961-1.37A9.955 9.955 0 0 0 12.004 22C17.523 22 22 17.523 22 12.004 22 6.477 17.523 2 12.004 2zm0 18.008a7.99 7.99 0 0 1-4.078-1.117l-.292-.173-3.036.839.856-3.122-.19-.312A7.984 7.984 0 0 1 4.01 12.004c0-4.413 3.591-8.004 8.004-8.004 4.413 0 7.994 3.591 7.994 8.004s-3.581 8.004-7.994 8.004z"/></svg>
                Consultar por WhatsApp
              </a>` : ''}
            </div>
          </div>
        </div>
      </div>

      <!-- GRID -->
      <div class="content-grid">
        <!-- COLUMNA PRINCIPAL -->
        <div>
          ${descripcion ? `
          <div class="section-card" style="margin-bottom:0">
            <div class="section-header"><h2>Descripción</h2></div>
            <div class="section-body"><p>${descripcion}</p></div>
          </div>` : ''}

          ${bloquesHtml ? `
          <div class="section-card" style="margin-top:${descripcion ? '20px' : '0'}">
            ${bloquesHtml}
          </div>` : ''}
        </div>

        <!-- SIDEBAR -->
        <div class="sidebar">
          <div class="info-card">
            <h3>Información de contacto</h3>
            ${telefono ? `<div class="info-row">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.09h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.96-.96a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              <div><div class="info-label">WhatsApp</div><div class="info-value">${telefono}</div></div>
            </div>` : ''}
            ${email ? `<div class="info-row">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
              <div><div class="info-label">Email</div><div class="info-value">${email}</div></div>
            </div>` : ''}
            ${ciudad ? `<div class="info-row">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              <div><div class="info-label">Ubicación</div><div class="info-value">${ciudad}</div></div>
            </div>` : ''}
          </div>

          ${(matriculaP || matriculaN) ? `
          <div class="info-card">
            <h3>Matrículas</h3>
            ${matriculaP ? `<div class="info-row">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
              <div><div class="info-label">Matrícula Provincial</div><div class="info-value">${matriculaP}</div></div>
            </div>` : ''}
            ${matriculaN ? `<div class="info-row">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
              <div><div class="info-label">Matrícula Nacional</div><div class="info-value">${matriculaN}</div></div>
            </div>` : ''}
          </div>` : ''}

          <div class="info-card" style="background: var(--verde-claro); border-color: #c3e0d8;">
            <p style="font-size:0.85rem; color: var(--verde); text-align:center; line-height:1.6;">
              ¿Sos psicólogo/a?<br>
              <a href="https://psicoapp-ten.vercel.app" style="font-weight:600; color: var(--verde); text-decoration:underline;">Conocé PsicoApp</a> — la plataforma para gestionar tu consultorio
            </p>
          </div>
        </div>
      </div>
    `;
  }

  function renderSkeleton() {
    return `
      <div class="hero">
        <div class="hero-card">
          <div class="hero-banner"></div>
          <div class="hero-body">
            <div class="avatar-wrap">
              <div class="avatar skeleton" style="background: #ccc;"></div>
            </div>
            <div class="hero-info" style="padding-top:16px">
              <div class="skeleton" style="height:28px; width:240px; margin-bottom:8px;"></div>
              <div class="skeleton" style="height:16px; width:160px; margin-bottom:12px;"></div>
              <div class="skeleton" style="height:14px; width:200px;"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="content-grid">
        <div>
          <div class="section-card">
            <div class="section-body">
              <div class="skeleton" style="height:14px; width:100%; margin-bottom:8px;"></div>
              <div class="skeleton" style="height:14px; width:80%;"></div>
            </div>
          </div>
        </div>
        <div class="sidebar">
          <div class="info-card">
            <div class="skeleton" style="height:16px; width:120px; margin-bottom:14px;"></div>
            <div class="skeleton" style="height:14px; width:100%; margin-bottom:8px;"></div>
            <div class="skeleton" style="height:14px; width:80%;"></div>
          </div>
        </div>
      </div>`;
  }

  function toggleAccordion(btn) {
    const item = btn.closest('.accordion-item');
    item.classList.toggle('open');
  }

  cargarPerfil();
</script>
</body>
</html>
